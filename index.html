<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momna Imtiaz — Finance Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 400: '#34d399', 500: '#10b981', 600: '#059669' },
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b1329; }
    .scrollbar-thin::-webkit-scrollbar { width: 5px; }
  app.add_middleware(
    CORSMiddleware,
    allow_origins=[
        "http://localhost:5173",
        "http://127.0.0.1:5173",
        "https://70146494-m6.github.io",  # Aapka GitHub Pages origin
    ],
    allow_credentials=True,
    allow_methods=["*"],
    allow_headers=["*"],
)
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const MONTHLY_BUDGET = 85000;

    const INITIAL_CATEGORY_BREAKDOWN = {
      housing: { label: 'Housing', amount: 35000, color: '#f43f5e', bg: 'bg-rose-500/10' },
      utilities: { label: 'Utilities', amount: 15000, color: '#06b6d4', bg: 'bg-cyan-500/10' },
      food: { label: 'Food', amount: 12000, color: '#eab308', bg: 'bg-yellow-500/15' },
      transport: { label: 'Transport', amount: 6000, color: '#0ea5e9', bg: 'bg-sky-500/10' },
      health: { label: 'Health', amount: 3000, color: '#10b981', bg: 'bg-emerald-500/10' },
      shopping: { label: 'Shopping', amount: 1400, color: '#ec4899', bg: 'bg-pink-500/10' },
      other: { label: 'Other', amount: 0, color: '#64748b', bg: 'bg-slate-500/10' }
    };

    const INITIAL_EXPENSES = [
      { id: 1, amount: 2500, category: 'food', description: 'Weekly groceries', date: '2026-06-02' },
      { id: 2, amount: 4500, category: 'transport', description: 'Petrol — fill-up', date: '2026-06-01' },
      { id: 3, amount: 35000, category: 'housing', description: 'Rent payment', date: '2026-05-30' },
      { id: 4, amount: 9500, category: 'utilities', description: 'Electric bill', date: '2026-05-28' },
    ];

    const PREDICTIONS = [
      { month: 'Jul 2026', status: 'Forecast Stable' },
      { month: 'Aug 2026', status: 'Forecast Stable' },
      { month: 'Sep 2026', status: 'Forecast Stable' },
    ];

    const fmt = (n) => 'PKR ' + Number(n).toLocaleString('en-PK', { maximumFractionDigits: 0 });

    function DynamicDonutChart({ breakdown }) {
      const total = Object.values(breakdown).reduce((sum, c) => sum + c.amount, 0);
      let accumulatedAngle = 0;

      return (
        <div className="flex flex-col items-center justify-center p-2 bg-[#131c35] border border-slate-800/80 rounded-xl">
          <h3 className="text-xs font-bold uppercase text-slate-400 mb-4 self-start">By Category</h3>
          <div className="relative w-36 h-36 flex items-center justify-center">
            <svg viewBox="0 0 40 40" className="w-full h-full transform -rotate-90">
              {Object.keys(breakdown).map((key) => {
                const cat = breakdown[key];
                if (cat.amount === 0 || total === 0) return null;
                const percentage = (cat.amount / total) * 100;
                const strokeDasharray = `${percentage} ${100 - percentage}`;
                const strokeDashoffset = -accumulatedAngle;
                accumulatedAngle += percentage;

                return (
                  <circle
                    key={key}
                    cx="20"
                    cy="20"
                    r="15.91549430918954"
                    fill="transparent"
                    stroke={cat.color}
                    strokeWidth="5"
                    strokeDasharray={strokeDasharray}
                    strokeDashoffset={strokeDashoffset}
                  />
                );
              })}
            </svg>
            <div className="absolute text-center">
              <p className="text-[10px] uppercase text-slate-400 font-semibold tracking-wider">Total</p>
              <p className="text-xs font-bold text-white">{fmt(total)}</p>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 mt-4 w-full text-[11px]">
            {Object.keys(breakdown).map((key) => {
              const cat = breakdown[key];
              if (cat.amount === 0) return null;
              return (
                <div key={key} className="flex items-center justify-between">
                  <div className="flex items-center gap-1.5 min-w-0">
                    <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: cat.color }}></span>
                    <span className="text-slate-300 truncate">{cat.label}</span>
                  </div>
                  <span className="text-slate-400 font-medium ml-1">{fmt(cat.amount)}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function Chatbot({ totalSpent }) {
      const [messages, setMessages] = useState([
        { text: "Hi Momna! I'm your personalized finance coach. Ask me about your spending, budgets, or forecasts.", isBot: true }
      ]);
      const [input, setInput] = useState("");

      const handleSend = (e) => {
        e.preventDefault();
        if (!input.trim()) return;

        const userMessages = [...messages, { text: input, isBot: false }];
        setMessages(userMessages);
        setInput("");

        setTimeout(() => {
          let reply = "Your trends look stable! Keep tracking daily inputs to maintain full control over your dynamic PKR 85,000 allowance layout.";
          if (totalSpent > MONTHLY_BUDGET * 0.75) {
            reply = "Heads up! You have utilized a major portion of your budget allocation. I recommend curbing non-essential spending.";
          }
          setMessages([...userMessages, { text: reply, isBot: true }]);
        }, 800);
      };

      return (
        <div className="bg-[#131c35] border border-slate-800/80 rounded-xl p-4 flex flex-col h-[480px]">
          <div className="border-b border-slate-800/60 pb-2 mb-3">
            <h3 className="text-sm font-bold text-white flex items-center gap-1.5">
              <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
              Momna Imtiaz AI
            </h3>
            <p className="text-[10px] text-slate-400">Financial coach assistant</p>
          </div>
          <div className="flex-1 overflow-y-auto space-y-3 mb-3 scrollbar-thin pr-1">
            {messages.map((m, i) => (
              <div key={i} className={`p-3 rounded-xl text-xs max-w-[85%] leading-relaxed ${m.isBot ? 'bg-[#1e293b] text-slate-200 self-start' : 'bg-emerald-600 text-white ml-auto'}`}>
                {m.text}
              </div>
            ))}
          </div>
          <form onSubmit={handleSend} className="flex gap-2 mt-auto">
            <input 
              type="text" 
              value={input} 
              onChange={(e) => setInput(e.target.value)}
              placeholder="Ask your coach..." 
              className="flex-1 bg-[#0b1329] border border-slate-800 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-emerald-500"
            />
            <button type="submit" className="bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors">Send</button>
          </form>
        </div>
      );
    }

    function App() {
      const [expenses, setExpenses] = useState(INITIAL_EXPENSES);
      const [categoryBreakdown, setCategoryBreakdown] = useState(() => {
        const current = { ...INITIAL_CATEGORY_BREAKDOWN };
        INITIAL_EXPENSES.forEach(exp => {
          if (current[exp.category]) current[exp.category].amount += exp.amount;
          else current.other.amount += exp.amount;
        });
        return current;
      });

      const [amount, setAmount] = useState("");
      const [category, setCategory] = useState("food");
      const [description, setDescription] = useState("");

      const totalSpent = expenses.reduce((sum, exp) => sum + exp.amount, 0);
      const headroom = MONTHLY_BUDGET - totalSpent;

      const handleAddExpense = (e) => {
        e.preventDefault();
        if (!amount || !description) return;
        
        const addedAmount = Number(amount);
        const newExp = {
          id: Date.now(),
          amount: addedAmount,
          category: category,
          description: description,
          date: '2026-06-21'
        };

        setExpenses([newExp, ...expenses]);
        
        setCategoryBreakdown(prev => {
          const updated = { ...prev };
          if (updated[category]) {
            updated[category].amount += addedAmount;
          } else {
            updated.other.amount += addedAmount;
          }
          return updated;
        });

        setAmount("");
        setDescription("");
      };

      return (
        <div className="min-h-screen bg-[#0b1329] text-slate-200">
          <header className="border-b border-slate-800/60 bg-[#0f172a]/80 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center font-bold text-white text-sm">MI</div>
              <div>
                <h1 className="text-base font-bold text-white tracking-tight">Momna Imtiaz Dashboard</h1>
                <p className="text-xs text-slate-400">Personal finance & expense tracking</p>
              </div>
            </div>
            <button className="text-xs bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-md font-medium">Review</button>
          </header>

          <main className="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6 w-full">
            <div className="lg:col-span-2 space-y-6">
              <div className="bg-[#131c35] border border-slate-800/80 rounded-xl p-5 text-center sm:text-left">
                <div className="flex flex-col sm:flex-row items-center gap-3 mb-4">
                  <div className="w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center font-bold text-sm text-white">MI</div>
                  <div>
                    <h2 className="text-sm font-semibold text-white">Momna Imtiaz</h2>
                    <p className="text-xs text-slate-400">PKR 85,000/mo budget layout</p>
                  </div>
                </div>
                
                <div className="grid grid-cols-3 gap-2 border-t border-slate-800/60 pt-4">
                  {PREDICTIONS.map((p, idx) => (
                    <div key={idx} className="text-center bg-[#0b1329]/40 py-2 rounded-lg border border-slate-900">
                      <p className="text-[10px] text-emerald-400 font-semibold">{p.month}</p>
                      <p className="text-xs font-bold text-white mt-0.5">{p.status}</p>
                    </div>
                  ))}
                </div>
                <p className="text-[11px] text-slate-400 mt-3">Spending aligned with your PKR 85,000/mo budget plan. Forecast trend remains fully stable.</p>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div className="bg-[#131c35] border border-slate-800/80 p-4 rounded-xl">
                  <p className="text-[11px] text-slate-400 uppercase font-medium tracking-wider">Total Spent</p>
                  <p className="text-xl font-bold text-white mt-1">{fmt(totalSpent)}</p>
                  <p className="text-[10px] text-slate-500 mt-0.5">{expenses.length} transaction logs recorded</p>
                </div>
                <div className="bg-[#131c35] border border-slate-800/80 p-4 rounded-xl">
                  <p className="text-[11px] text-slate-400 uppercase font-medium tracking-wider">Monthly Budget</p>
                  <p className="text-xl font-bold text-white mt-1">{fmt(MONTHLY_BUDGET)}</p>
                  <p className="text-[10px] text-emerald-400 mt-0.5">100% Core system allocation</p>
                </div>
                <div className="bg-[#131c35] border border-slate-800/80 p-4 rounded-xl">
                  <p className="text-[11px] text-slate-400 uppercase font-medium tracking-wider">Remaining Balance</p>
                  <p className="text-xl font-bold text-emerald-400 mt-1">{fmt(headroom)}</p>
                  <p className="text-[10px] text-slate-400 mt-0.5">Available liquidity sync safe</p>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="bg-[#131c35] border border-slate-800/80 rounded-xl p-5">
                  <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3">Add Expense</h3>
                  <form onSubmit={handleAddExpense} className="space-y-3">
                    <div>
                      <input 
                        type="number" 
                        value={amount} 
                        onChange={e => setAmount(e.target.value)} 
                        className="w-full bg-[#0b1329] border border-slate-800 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-emerald-500 text-white" 
                        placeholder="Amount (PKR)" 
                        required 
                      />
                    </div>
                    <div>
                      <select 
                        value={category} 
                        onChange={e => setCategory(e.target.value)} 
                        className="w-full bg-[#0b1329] border border-slate-800 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-emerald-500 text-slate-300"
                      >
                        {Object.keys(categoryBreakdown).map(k => (
                          <option key={k} value={k}>{categoryBreakdown[k].label}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <input 
                        type="text" 
                        value={description} 
                        onChange={e => setDescription(e.target.value)} 
                        className="w-full bg-[#0b1329] border border-slate-800 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-emerald-500 text-white" 
                        placeholder="Description" 
                        required 
                      />
                    </div>
                    <button type="submit" className="w-full bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-semibold py-2 rounded-lg transition-colors mt-1">
                      Add expense
                    </button>
                  </form>
                  <p className="text-[10px] text-slate-500 mt-3 text-center">
                    {fmt(headroom)} remaining of your PKR 85,000 budget matrix.
                  </p>
                </div>

                <div className="bg-[#131c35] border border-slate-800/80 rounded-xl p-5 flex flex-col h-[245px]">
                  <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Recent Expenses</h3>
                  <div className="flex-1 overflow-y-auto space-y-2 scrollbar-thin pr-1">
                    {expenses.map((exp) => {
                      const meta = categoryBreakdown[exp.category] || categoryBreakdown.other;
                      return (
                        <div key={exp.id} className="bg-[#0b1329]/60 border border-slate-900/60 p-2.5 rounded-lg flex justify-between items-center text-xs">
                          <div>
                            <p className="font-semibold text-slate-200">{exp.description}</p>
                            <span className={`text-[9px] px-2 py-0.5 rounded font-medium inline-block mt-1 ${meta.bg}`} style={{ color: meta.color }}>
                              {meta.label}
                            </span>
                          </div>
                          <p className="font-bold text-white">-{fmt(exp.amount)}</p>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              <DynamicDonutChart breakdown={categoryBreakdown} />
            </div>

            <div className="lg:col-span-1">
              <Chatbot totalSpent={totalSpent} />
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
