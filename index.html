<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceAI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 400: '#34d399', 500: '#10b981', 600: '#059669' },
          },
          fontFamily: { sans: ['DM Sans', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    .scrollbar-thin { scrollbar-width: thin; scrollbar-color: #475569 transparent; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased min-h-screen">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    const { useState, useEffect, useRef } = React;

    const MONTHLY_BUDGET = 85000;

    const CATEGORY_BREAKDOWN = {
      housing: { label: 'Housing', amount: 35000, color: '#f43f5e' },
      utilities: { label: 'Utilities', amount: 15000, color: '#06b6d4' },
      food: { label: 'Food', amount: 12000, color: '#eab308' },
      transport: { label: 'Transport', amount: 6000, color: '#0ea5e9' },
      health: { label: 'Health', amount: 3000, color: '#10b981' },
      shopping: { label: 'Shopping', amount: 1400, color: '#ec4899' },
    };

    const CATEGORY_ORDER = ['housing', 'utilities', 'food', 'transport', 'health', 'shopping'];

    const MOCK_EXPENSES = [
      { id: 1, amount: 2500, category: 'food', description: 'Weekly groceries', date: '2026-06-02' },
      { id: 2, amount: 4500, category: 'transport', description: 'Petrol — fill-up', date: '2026-06-01' },
      { id: 3, amount: 35000, category: 'housing', description: 'Rent payment', date: '2026-05-30' },
      { id: 4, amount: 9500, category: 'utilities', description: 'Electric bill', date: '2026-05-28' },
      { id: 5, amount: 5000, category: 'health', description: 'Gym membership', date: '2026-05-25' },
      { id: 6, amount: 1400, category: 'shopping', description: 'Home supplies', date: '2026-05-20' },
    ];

    const CATEGORY_OPTIONS = ['other', 'food', 'transport', 'housing', 'entertainment', 'health', 'shopping', 'utilities'];

    const PREDICTIONS = [
      { month: 'Jul 2026', predicted_amount: 78000, confidence: 0.82 },
      { month: 'Aug 2026', predicted_amount: 82000, confidence: 0.72 },
      { month: 'Sep 2026', predicted_amount: 85000, confidence: 0.62 },
    ];

    const CATEGORY_COLORS = {
      housing: 'text-rose-400 bg-rose-500/10',
      food: 'text-yellow-400 bg-yellow-500/15 border border-yellow-500/20',
      transport: 'text-sky-400 bg-sky-500/10',
      entertainment: 'text-violet-400 bg-violet-500/10',
      health: 'text-emerald-400 bg-emerald-500/10',
      shopping: 'text-pink-400 bg-pink-500/10',
      utilities: 'text-cyan-400 bg-cyan-500/10',
      other: 'text-slate-400 bg-slate-500/10',
    };

    const fmt = (n) => 'PKR ' + Number(n).toLocaleString('en-PK', { maximumFractionDigits: 0 });

    function breakdownTotal(byCategory) {
      return Object.values(byCategory).reduce((s, c) => s + c.amount, 0);
    }

    function computeSummary(expenses, byCategory) {
      const total = breakdownTotal(byCategory);
      return {
        total_spent: total,
        monthly_average: total,
        by_category: byCategory,
        expense_count: expenses.length,
      };
    }

    function coachReply(message, summary) {
      const t = message.toLowerCase();
      if (/hello|hi|hey/.test(t))
        return `Hi Momna! You've spent ${fmt(summary.total_spent)} in the last 30 days. Ask about categories, forecasts, or saving tips.`;
      if (/predict|forecast|future/.test(t))
        return PREDICTIONS.map((p) => `**${p.month}**: ~${fmt(p.predicted_amount)} (${Math.round(p.confidence * 100)}% confidence)`).join('\n') +
          '\n\nSpending looks stable against your PKR 85,000/mo budget.';
      if (/category|breakdown|spending/.test(t)) {
        const lines = CATEGORY_ORDER.map((k) => {
          const c = summary.by_category[k];
          return c ? `• **${c.label}**: ${fmt(c.amount)}` : null;
        }).filter(Boolean);
        return 'Spending by category:\n\n' + lines.join('\n');
      }
      if (/save|budget/.test(t))
        return `Your budget is **PKR 85,000/mo**. Headroom: **${fmt(Math.max(MONTHLY_BUDGET - summary.monthly_average, 0))}**. Review **housing** and discretionary categories first.`;
      if (/tip|advice/.test(t))
        return '💡 **Tip:** Track every expense for two weeks — awareness alone often cuts discretionary spending by ~10%.';
      return 'I can help with spending breakdown, forecasts, and budget tips.';
    }

    function formatMsg(text) {
      return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>');
    }

    function ProfileCard() {
      return (
        <div className="flex items-center gap-4 rounded-xl border border-slate-700/60 bg-gradient-to-r from-slate-800/90 to-slate-900/70 p-4 mb-5">
          <div className="flex h-16 w-16 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-violet-500 via-brand-500 to-teal-500 text-lg font-bold text-white shadow-lg shadow-brand-500/30 ring-2 ring-slate-600/80">
            MI
          </div>
          <div>
            <p className="text-lg font-semibold text-white">Momna Imtiaz</p>
            <p className="text-sm text-slate-400 mt-0.5">PKR 85,000/mo</p>
          </div>
        </div>
      );
    }

    function StatCard({ label, value, sub, accent }) {
      const ring = accent === 'amber' ? 'border-amber-500/30 from-amber-500/20' : accent === 'violet' ? 'border-violet-500/30 from-violet-500/20' : 'border-brand-500/30 from-brand-500/20';
      return (
        <div className={`rounded-2xl border bg-gradient-to-br p-5 ${ring} to-transparent`}>
          <p className="text-xs font-medium text-slate-400 uppercase tracking-wider">{label}</p>
          <p className="mt-2 text-2xl font-bold tabular-nums text-white">{value}</p>
          {sub && <p className="mt-1 text-sm text-slate-400">{sub}</p>}
        </div>
      );
    }

    function BarChart({ data }) {
      const max = Math.max(...data.map((d) => d.predicted_amount), 1);
      return (
        <div className="flex items-end justify-between gap-3 h-36 pt-2">
          {data.map((d) => (
            <div key={d.month} className="flex-1 flex flex-col items-center gap-2">
              <span className="text-[10px] text-slate-500">PKR {(d.predicted_amount / 1000).toFixed(0)}k</span>
              <div
                className="w-full max-w-[52px] rounded-t-lg bg-brand-500 transition-all"
                style={{ height: `${(d.predicted_amount / max) * 100}%`, minHeight: '14px' }}
              />
              <span className="text-xs text-slate-400 text-center">{d.month}</span>
            </div>
          ))}
        </div>
      );
    }

    function CategoryDoughnut({ byCategory }) {
      const entries = CATEGORY_ORDER.map((key) => byCategory[key]).filter(Boolean);
      const total = entries.reduce((s, c) => s + c.amount, 0) || 1;
      let offset = 0;
      const slices = entries.map((cat) => {
        const pct = (cat.amount / total) * 100;
        const slice = { ...cat, pct, offset };
        offset += pct;
        return slice;
      });
      const gradient = slices.map((s) => `${s.color} ${s.offset}% ${s.offset + s.pct}%`).join(', ');
      return (
        <div className="flex flex-col sm:flex-row items-center gap-8">
          <div className="relative shrink-0">
            <div
              className="w-40 h-40 rounded-full shadow-inner shadow-black/30"
              style={{
                background: `conic-gradient(${gradient})`,
                WebkitMask: 'radial-gradient(circle, transparent 48%, black 49%)',
                mask: 'radial-gradient(circle, transparent 48%, black 49%)',
              }}
            />
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
              <div className="text-center">
                <p className="text-[10px] text-slate-500 uppercase tracking-wider">Total</p>
                <p className="text-sm font-bold text-white tabular-nums">{fmt(total)}</p>
              </div>
            </div>
          </div>
          <ul className="space-y-2.5 text-sm w-full">
            {entries.map((cat) => (
              <li key={cat.label} className="flex items-center gap-3 text-slate-300">
                <span className="w-3 h-3 rounded-full shrink-0 ring-2 ring-slate-700/80" style={{ background: cat.color }} />
                <span className="font-medium text-slate-200">{cat.label}</span>
                <span className="text-slate-400 ml-auto tabular-nums font-semibold">{fmt(cat.amount)}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function Chatbot({ summary }) {
      const [messages, setMessages] = useState([
        { role: 'assistant', content: "Hi Momna! I'm your AI finance coach. Ask about spending, budgets, or forecasts." },
      ]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const bottomRef = useRef(null);
      const suggestions = ["What's my spending breakdown?", 'Predict my expenses', 'How can I save more?'];

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

      const send = (text) => {
        const msg = (text || input).trim();
        if (!msg || loading) return;
        setMessages((m) => [...m, { role: 'user', content: msg }]);
        setInput('');
        setLoading(true);
        setTimeout(() => {
          setMessages((m) => [...m, { role: 'assistant', content: coachReply(msg, summary) }]);
          setLoading(false);
        }, 400);
      };

      return (
        <div className="flex flex-col h-[calc(100vh-7rem)] xl:h-[calc(100vh-5.5rem)] sticky top-[5.5rem] rounded-2xl border border-slate-800 bg-slate-900/80 overflow-hidden shadow-xl shadow-black/20">
          <div className="px-5 py-4 border-b border-slate-800 bg-gradient-to-r from-brand-600/20 to-transparent">
            <h2 className="font-semibold text-white">AI Coach</h2>
            <p className="text-xs text-slate-400 mt-0.5">FinanceAI · preview</p>
          </div>
          <div className="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-thin">
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div
                  className={`max-w-[90%] rounded-2xl px-4 py-2.5 text-sm leading-relaxed ${
                    m.role === 'user' ? 'bg-brand-600 text-white rounded-br-md' : 'bg-slate-800 text-slate-200 rounded-bl-md border border-slate-700/50'
                  }`}
                  dangerouslySetInnerHTML={m.role === 'assistant' ? { __html: formatMsg(m.content) } : undefined}
                >
                  {m.role === 'user' ? m.content : null}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex gap-1 bg-slate-800 rounded-2xl px-4 py-3 w-fit">
                {[0, 150, 300].map((d) => (
                  <span key={d} className="w-2 h-2 rounded-full bg-slate-500 animate-bounce" style={{ animationDelay: `${d}ms` }} />
                ))}
              </div>
            )}
            <div ref={bottomRef} />
          </div>
          <div className="px-3 pb-2 flex flex-wrap gap-1.5">
            {suggestions.map((s) => (
              <button key={s} type="button" onClick={() => send(s)} className="text-[11px] px-2.5 py-1 rounded-full bg-slate-800 hover:bg-slate-700 text-slate-400 border border-slate-700">
                {s}
              </button>
            ))}
          </div>
          <form className="p-3 border-t border-slate-800 flex gap-2" onSubmit={(e) => { e.preventDefault(); send(); }}>
            <input
              value={input}
              onChange={(e) => setInput(e.target.value)}
              placeholder="Ask your coach…"
              className="flex-1 rounded-xl bg-slate-800 border border-slate-700 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/50"
            />
            <button type="submit" className="rounded-xl bg-brand-600 hover:bg-brand-500 px-4 py-2.5 text-sm font-medium">Send</button>
          </form>
        </div>
      );
    }

    function App() {
      const [expenses, setExpenses] = useState(MOCK_EXPENSES);
      const [byCategory, setByCategory] = useState(() =>
        Object.fromEntries(Object.entries(CATEGORY_BREAKDOWN).map(([k, v]) => [k, { ...v }]))
      );
      const [amount, setAmount] = useState('');
      const [description, setDescription] = useState('');
      const [category, setCategory] = useState('other');
      const summary = computeSummary(expenses, byCategory);
      const headroom = Math.max(MONTHLY_BUDGET - summary.monthly_average, 0);
      const nextIdRef = useRef(Math.max(...MOCK_EXPENSES.map((e) => e.id), 0) + 1);

      const addExpense = (e) => {
        e.preventDefault();
        if (!amount || !description) return;
        const parsed = parseFloat(amount);
        const id = nextIdRef.current++;
        setExpenses((ex) => [
          { id, amount: parsed, category, description, date: new Date().toISOString().slice(0, 10) },
          ...ex,
        ]);
        setByCategory((prev) => {
          const next = { ...prev };
          if (next[category]) {
            next[category] = { ...next[category], amount: next[category].amount + parsed };
          } else {
            next[category] = {
              label: category.charAt(0).toUpperCase() + category.slice(1),
              amount: parsed,
              color: '#64748b',
            };
          }
          return next;
        });
        setAmount('');
        setDescription('');
      };

      return (
        <div className="min-h-screen">
          <header className="border-b border-slate-800 bg-slate-900/90 backdrop-blur sticky top-0 z-10">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center text-sm font-bold shadow-lg shadow-brand-500/20">₨</div>
                <div>
                  <h1 className="text-xl sm:text-2xl font-bold tracking-tight text-white">FinanceAI Dashboard</h1>
                  <p className="text-xs text-slate-400">Momna Imtiaz · expense tracking</p>
                </div>
              </div>
              <span className="hidden sm:inline text-xs px-3 py-1 rounded-full bg-brand-500/10 text-brand-400 border border-brand-500/20">Preview</span>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
            <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
              <div className="xl:col-span-2 space-y-6">

                {/* Row 1: Spending forecast + profile */}
                <section className="rounded-2xl border border-slate-800 bg-slate-900/50 p-5">
                  <h3 className="text-sm font-semibold text-slate-200 mb-1">Spending forecast</h3>
                  <ProfileCard />
                  <BarChart data={PREDICTIONS} />
                  <p className="mt-4 text-sm text-brand-200/90 border border-brand-500/20 bg-brand-500/5 rounded-lg px-4 py-3">
                    Spending aligned with your <strong className="text-brand-300">PKR 85,000/mo</strong> budget. Forecast trend: stable.
                  </p>
                </section>

                {/* Row 2: Total (30 days) stat cards */}
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  <StatCard
                    label="Total (30 days)"
                    value={fmt(summary.total_spent)}
                    sub={`${summary.expense_count} transactions`}
                  />
                  <StatCard
                    label="Monthly average"
                    value={fmt(summary.monthly_average)}
                    accent="amber"
                  />
                  <StatCard
                    label="Budget headroom"
                    value={fmt(headroom)}
                    sub={`of ${fmt(MONTHLY_BUDGET)} budget`}
                    accent="violet"
                  />
                </div>

                {/* Two-column: Expenses breakdown (left) · Actions (right) */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  {/* Left — Expenses breakdown */}
                  <div className="space-y-6">
                    <div className="rounded-2xl border border-slate-800 bg-slate-900/50 p-5 shadow-lg shadow-black/10">
                      <p className="text-xs font-medium text-slate-500 uppercase tracking-wider mb-1">Expenses breakdown</p>
                      <h3 className="text-sm font-semibold text-slate-200 mb-5">By category</h3>
                      <CategoryDoughnut byCategory={byCategory} />
                    </div>

                    <div className="rounded-2xl border border-slate-800 bg-slate-900/50 p-5 shadow-lg shadow-black/10">
                      <h3 className="text-sm font-semibold text-slate-200 mb-3">Recent expenses</h3>
                      <ul className="divide-y divide-slate-800 max-h-72 overflow-y-auto scrollbar-thin">
                        {expenses.length === 0 ? (
                          <li className="text-sm text-slate-500 py-8 text-center">No expenses yet.</li>
                        ) : (
                          expenses.map((e) => (
                            <li key={e.id} className="flex justify-between items-center py-3.5 group">
                              <div className="min-w-0 flex-1 pr-3">
                                <p className="text-sm font-medium text-slate-100">{e.description}</p>
                                <span className={`text-[10px] font-semibold px-2 py-0.5 rounded-md inline-block mt-1.5 capitalize ${CATEGORY_COLORS[e.category] || CATEGORY_COLORS.other}`}>
                                  {e.category === 'food' ? 'Food' : e.category}
                                </span>
                              </div>
                              <div className="flex items-center gap-2 shrink-0">
                                <span className="text-sm font-bold tabular-nums text-white">{fmt(e.amount)}</span>
                                <button
                                  type="button"
                                  onClick={() => setExpenses((ex) => ex.filter((x) => x.id !== e.id))}
                                  className="text-slate-500 hover:text-rose-400 text-xs opacity-0 group-hover:opacity-100 transition-opacity"
                                  title="Delete"
                                >
                                  ✕
                                </button>
                              </div>
                            </li>
                          ))
                        )}
                      </ul>
                    </div>
                  </div>

                  {/* Right — Actions */}
                  <div className="rounded-2xl border border-slate-800 bg-slate-900/50 p-5 shadow-lg shadow-black/10 h-fit lg:sticky lg:top-28">
                    <p className="text-xs font-medium text-slate-500 uppercase tracking-wider mb-1">Actions</p>
                    <h3 className="text-sm font-semibold text-slate-200 mb-5">Add expense</h3>
                    <form onSubmit={addExpense} className="space-y-4">
                      <div>
                        <label className="block text-xs text-slate-400 mb-1.5">Amount (PKR)</label>
                        <input
                          type="number"
                          step="1"
                          min="1"
                          required
                          placeholder="e.g. 2500"
                          value={amount}
                          onChange={(e) => setAmount(e.target.value)}
                          className="w-full rounded-xl bg-slate-800/80 border border-slate-700 px-4 py-2.5 text-sm text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/40"
                        />
                      </div>
                      <div>
                        <label className="block text-xs text-slate-400 mb-1.5">Category</label>
                        <select
                          value={category}
                          onChange={(e) => setCategory(e.target.value)}
                          className="w-full rounded-xl bg-slate-800/80 border border-slate-700 px-4 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/40"
                        >
                          {CATEGORY_OPTIONS.map((c) => (
                            <option key={c} value={c}>{c.charAt(0).toUpperCase() + c.slice(1)}</option>
                          ))}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs text-slate-400 mb-1.5">Description</label>
                        <input
                          required
                          placeholder="What was this for?"
                          value={description}
                          onChange={(e) => setDescription(e.target.value)}
                          className="w-full rounded-xl bg-slate-800/80 border border-slate-700 px-4 py-2.5 text-sm text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/40"
                        />
                      </div>
                      <button type="submit" className="w-full rounded-xl bg-brand-600 hover:bg-brand-500 py-3 text-sm font-semibold text-white transition-colors shadow-lg shadow-brand-600/20">
                        Add expense
                      </button>
                    </form>
                    <p className="mt-4 text-xs text-slate-500 leading-relaxed">
                      {fmt(headroom)} remaining of your PKR 85,000 monthly budget.
                    </p>
                  </div>
                </div>
              </div>

              {/* AI Coach sidebar */}
              <div className="xl:col-span-1">
                <Chatbot summary={summary} />
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
